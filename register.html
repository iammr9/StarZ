<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starry Login</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="page.css">

  <style>
    
    .login-view{
      min-height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
    }

    .login-card{
      width:100%;
      max-width:460px;

      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);

      border-radius:28px;
      padding:34px;
      z-index:1;
      text-align:center;
    }

    .login-card h1{
      margin:0 0 10px;
      font-size:42px;
    }

    .login-card p{
      opacity:0.85;
      margin-bottom:24px;
    }

    .login-form{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .login-form input{
      width:100%;
      padding:14px 16px;

      border-radius:14px;
      border:1px solid rgba(255,255,255,0.12);

      background:rgba(255,255,255,0.06);
      color:#fff;
      font-size:16px;
      outline:none;
    }

    .login-form input::placeholder{
      color:rgba(255,255,255,0.65);
    }

    .login-form button{
      padding:14px;
      border:none;
      border-radius:14px;
      cursor:pointer;

      background:#5e72eb;
      color:#fff;
      font-size:16px;
      transition:0.2s;
    }

    .login-form button:hover{
      transform:translateY(-2px);
    }

    .login-links{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .login-links a{
      color:#8ea2ff;
      text-decoration:none;
      font-size:15px;
    }

    .note{
      margin-top:18px;
      font-size:13px;
      opacity:0.6;
    }

    @media (max-width:768px){

      .login-view{
        align-items:flex-start;
        padding:12px;
      }

      .login-card{
        padding:26px;
      }

      .login-card h1{
        font-size:34px;
      }
    }
  </style>
</head>

<body>

  <a href="index.html" class="brand">✦Starry✦</a>

  <div class="top-right">
    <a href="course.html" class="nav-top">Course</a>
    <a href="quiz.html" class="nav-top">Quiz</a>
    <a href="comment.html" class="nav-top">Comment</a>
    <a href="login.html" id="userBtn" class="nav-top">Login</a>
  </div>

  <section class="login-view">

    <div class="login-card">

      <h1>Register</h1>

      <p>สมัครสมาชิกเพื่อเข้าสู่ระบบ</p>

      <form class="login-form">

        <input id="regUser" placeholder="Username">

        <input id="regPass" type="password" placeholder="Password">

        <button type="button" onclick="register()">Register</button>

      </form>

      <div class="login-links">
        <a href="login.html">เข้าสู่ระบบ</a>
        <a href="index.html">กลับหน้าแรก</a>
      </div>


    </div>

  </section>
<script>
  function register(){
  const u = regUser.value.trim();
  const p = regPass.value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  if(users.find(x => x.username === u)){
    alert("มีผู้ใช้นี้แล้ว");
    return;
  }

  users.push({username:u, password:p});
  localStorage.setItem("users", JSON.stringify(users));

  alert("สมัครสำเร็จ");
  location.href = "login.html";
}

function getCurrentUser(){
  return JSON.parse(localStorage.getItem("currentUser"));
}

const user = JSON.parse(localStorage.getItem("currentUser"));
const btn = document.getElementById("userBtn");

if(user){
  btn.innerText = user.username;   // เปลี่ยนเป็นชื่อ
  btn.href = "profile.html";       // กดไปหน้า profile
}
</script>
</body>
</html>
